version: '3.8'

services:
  api_node_1:
    build: ./api
    restart: unless-stopped
    environment:
      SERVER_ID: Node_1
      DB_MASTER_HOST: db_master
      DB_SLAVE_HOST: db_slave
      DB_USER: root
      DB_PASSWORD: root_password
      DB_NAME: appdb
    depends_on:
      db_master:
        condition: service_healthy
    networks:
      - app_net

  api_node_2:
    build: ./api
    restart: unless-stopped
    environment:
      SERVER_ID: Node_2
      DB_MASTER_HOST: db_master
      DB_SLAVE_HOST: db_slave
      DB_USER: root
      DB_PASSWORD: root_password
      DB_NAME: appdb
    depends_on:
      db_master:
        condition: service_healthy
    networks:
      - app_net

  db_master:
    image: mysql:8
    container_name: db_master
    restart: unless-stopped
    command:
      - --server-id=1
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --binlog-do-db=appdb
      - --gtid-mode=ON
      - --enforce-gtid-consistency=ON
      - --log-replica-updates=ON
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: appdb
    volumes:
      - ./db/master/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - db_master_data:/var/lib/mysql
    networks:
      - app_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  db_slave:
    image: mysql:8
    container_name: db_slave
    restart: unless-stopped
    command:
      - --server-id=2
      - --relay-log=mysql-relay-bin
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --log-replica-updates=ON
      - --gtid-mode=ON
      - --enforce-gtid-consistency=ON
      - --read-only=ON
    environment:
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - ./db/slave/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - db_slave_data:/var/lib/mysql
    depends_on:
      db_master:
        condition: service_healthy
    networks:
      - app_net

  db_gui:
    image: adminer
    container_name: db_gui
    restart: unless-stopped
    ports:
      - "8081:8080"
    networks:
      - app_net

volumes:
  db_master_data:
  db_slave_data:

networks:
  app_net:
    driver: bridge
